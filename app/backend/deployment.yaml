apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: nginx
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: public.ecr.aws/docker/library/python:3.9
        command: ["sh", "-c"]
        args:
          - |
            pip install flask mysql-connector-python

            cat > app.py <<EOF
            from flask import Flask, jsonify
            import mysql.connector

            app = Flask(__name__)

            db = mysql.connector.connect(
                host="mysql-service",
                user="user",
                password="password",
                database="testdb"
            )

            @app.route("/users")
            def users():
                cursor = db.cursor(dictionary=True)
                cursor.execute("SELECT * FROM users")
                result = cursor.fetchall()
                return jsonify(result)

            app.run(host="0.0.0.0", port=3000)
            EOF

            python app.py
        ports:
        - containerPort: 3000

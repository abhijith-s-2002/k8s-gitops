apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: public.ecr.aws/docker/library/node:18
        command: ["sh", "-c"]
        args:
          - |
            echo "Installing deps..."
            npm init -y
            npm install express mysql2

            echo "Creating server..."
            cat > server.js <<EOF
            const express = require('express');
            const mysql = require('mysql2');

            const app = express();

            const db = mysql.createConnection({
              host: 'mysql-service',
              user: 'user',
              password: 'password',
              database: 'testdb'
            });

            app.get('/users', (req, res) => {
              db.query('SELECT * FROM users', (err, results) => {
                if (err) {
                  console.error(err);
                  return res.status(500).send(err);
                }
                res.json(results);
              });
            });

            app.listen(3000, () => console.log('Server running'));
            EOF

            echo "Starting server..."
            node server.js
        ports:
        - containerPort: 3000